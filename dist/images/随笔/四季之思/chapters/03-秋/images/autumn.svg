<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d0a0"/>
      <stop offset="100%" stop-color="#e8a860"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#ag)"/>
  <!-- 远山 -->
  <path d="M0,280 Q200,180 400,250 Q600,160 800,230 L800,400 L0,400Z" fill="#c89050" opacity="0.3"/>
  <!-- 树干 -->
  <rect x="280" y="140" width="16" height="160" rx="5" fill="#6a4a30"/>
  <rect x="500" y="170" width="14" height="130" rx="4" fill="#7a5a3a"/>
  <!-- 树冠 - 暖色 -->
  <circle cx="288" cy="120" r="55" fill="#d4752a" opacity="0.8"/>
  <circle cx="250" cy="100" r="40" fill="#e08a30" opacity="0.7"/>
  <circle cx="330" cy="90" r="42" fill="#c86820" opacity="0.75"/>
  <circle cx="288" cy="75" r="35" fill="#e8a040" opacity="0.6"/>
  <circle cx="507" cy="150" r="48" fill="#d4752a" opacity="0.75"/>
  <circle cx="470" cy="130" r="35" fill="#c86820" opacity="0.65"/>
  <circle cx="540" cy="125" r="38" fill="#e08a30" opacity="0.7"/>
  <!-- 飘落的树叶 -->
  <path d="M180,80 l8,-5 l8,5 l-8,5z" fill="#d4752a" opacity="0.6" transform="rotate(15,180,80)"/>
  <path d="M600,100 l7,-4 l7,4 l-7,4z" fill="#e08a30" opacity="0.5" transform="rotate(-20,600,100)"/>
  <path d="M400,60 l6,-4 l6,4 l-6,4z" fill="#c86820" opacity="0.55" transform="rotate(30,400,60)"/>
  <path d="M150,150 l7,-4 l7,4 l-7,4z" fill="#e8a040" opacity="0.5" transform="rotate(-10,150,150)"/>
  <path d="M680,160 l6,-3 l6,3 l-6,3z" fill="#d4752a" opacity="0.45" transform="rotate(25,680,160)"/>
  <!-- 地面落叶 -->
  <path d="M200,340 l10,-6 l10,6 l-10,6z" fill="#c86820" opacity="0.5"/>
  <path d="M350,355 l8,-5 l8,5 l-8,5z" fill="#d4752a" opacity="0.4"/>
  <path d="M550,345 l9,-5 l9,5 l-9,5z" fill="#e08a30" opacity="0.45"/>
  <path d="M100,360 l7,-4 l7,4 l-7,4z" fill="#c86820" opacity="0.35"/>
  <path d="M680,350 l8,-4 l8,4 l-8,4z" fill="#e8a040" opacity="0.4"/>
  <!-- 地面 -->
  <ellipse cx="400" cy="380" rx="500" ry="40" fill="#b88040" opacity="0.3"/>
</svg>
