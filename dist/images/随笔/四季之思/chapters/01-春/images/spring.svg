<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="50%" stop-color="#f8bbd0"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#sg)"/>
  <!-- 柳枝 -->
  <g opacity="0.5">
    <path d="M0,0 Q60,40 120,120" stroke="#6a9a5a" stroke-width="2" fill="none"/>
    <path d="M20,0 Q80,50 100,130" stroke="#7aaa6a" stroke-width="1.5" fill="none"/>
    <path d="M40,0 Q100,60 130,140" stroke="#6a9a5a" stroke-width="2" fill="none"/>
    <path d="M150,0 Q180,50 200,100" stroke="#7aaa6a" stroke-width="1.5" fill="none"/>
  </g>
  <!-- 樱花树 -->
  <rect x="560" y="160" width="12" height="140" rx="4" fill="#8a6a50"/>
  <circle cx="566" cy="130" r="60" fill="#f4a7b9" opacity="0.8"/>
  <circle cx="530" cy="110" r="40" fill="#f8c0d0" opacity="0.7"/>
  <circle cx="600" cy="100" r="45" fill="#f4a7b9" opacity="0.75"/>
  <circle cx="566" cy="80" r="35" fill="#fad0dd" opacity="0.6"/>
  <!-- 飘落的花瓣 -->
  <ellipse cx="480" cy="80" rx="6" ry="4" fill="#f4a7b9" opacity="0.6" transform="rotate(-30,480,80)"/>
  <ellipse cx="650" cy="200" rx="5" ry="3" fill="#f8c0d0" opacity="0.5" transform="rotate(20,650,200)"/>
  <ellipse cx="420" cy="180" rx="5" ry="3" fill="#f4a7b9" opacity="0.4" transform="rotate(-45,420,180)"/>
  <ellipse cx="350" cy="120" rx="4" ry="3" fill="#fad0dd" opacity="0.5" transform="rotate(15,350,120)"/>
  <ellipse cx="700" cy="150" rx="5" ry="3" fill="#f8c0d0" opacity="0.4" transform="rotate(-20,700,150)"/>
  <!-- 地面草地 -->
  <ellipse cx="400" cy="380" rx="500" ry="40" fill="#a8d5a0" opacity="0.5"/>
  <!-- 小花 -->
  <circle cx="200" cy="340" r="5" fill="#fff" opacity="0.7"/><circle cx="200" cy="340" r="2" fill="#f0d060"/>
  <circle cx="300" cy="355" r="4" fill="#f4a7b9" opacity="0.6"/><circle cx="300" cy="355" r="1.5" fill="#f0d060"/>
  <circle cx="450" cy="350" r="5" fill="#fff" opacity="0.7"/><circle cx="450" cy="350" r="2" fill="#f0d060"/>
  <circle cx="680" cy="345" r="4" fill="#f4a7b9" opacity="0.6"/><circle cx="680" cy="345" r="1.5" fill="#f0d060"/>
</svg>
