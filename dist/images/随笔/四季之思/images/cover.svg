<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e8d0"/>
      <stop offset="100%" stop-color="#e8c9a0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#sky)"/>
  <!-- 四季符号 -->
  <!-- 春 - 樱花 -->
  <g transform="translate(100,200)" opacity="0.7">
    <circle r="18" fill="#f4a7b9"/><circle cx="16" cy="12" r="18" fill="#f4a7b9"/><circle cx="-16" cy="12" r="18" fill="#f4a7b9"/><circle cx="10" cy="-14" r="18" fill="#f4a7b9"/><circle cx="-10" cy="-14" r="18" fill="#f4a7b9"/><circle r="8" fill="#f9d4e0"/>
  </g>
  <text x="100" y="260" text-anchor="middle" font-family="serif" font-size="22" fill="#a06050" opacity="0.8">春</text>
  <!-- 夏 - 荷叶 -->
  <g transform="translate(300,195)" opacity="0.7">
    <ellipse rx="40" ry="30" fill="#5ba55b"/><line x1="0" y1="-30" x2="0" y2="0" stroke="#4a904a" stroke-width="1.5"/>
    <circle cx="8" cy="-8" r="14" fill="#e85a6e" opacity="0.9"/><circle cx="8" cy="-8" r="5" fill="#f0d060"/>
  </g>
  <text x="300" y="260" text-anchor="middle" font-family="serif" font-size="22" fill="#3a7030" opacity="0.8">夏</text>
  <!-- 秋 - 枫叶 -->
  <g transform="translate(500,200)" opacity="0.7">
    <path d="M0,-35 L8,-15 L30,-20 L15,0 L25,25 L0,15 L-25,25 L-15,0 L-30,-20 L-8,-15Z" fill="#d4752a"/>
    <line x1="0" y1="15" x2="0" y2="40" stroke="#8a5020" stroke-width="2"/>
  </g>
  <text x="500" y="260" text-anchor="middle" font-family="serif" font-size="22" fill="#b06020" opacity="0.8">秋</text>
  <!-- 冬 - 雪花 -->
  <g transform="translate(700,200)" opacity="0.7">
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#7a9ab5" stroke-width="2.5"/>
    <line x1="-24" y1="-14" x2="24" y2="14" stroke="#7a9ab5" stroke-width="2.5"/>
    <line x1="-24" y1="14" x2="24" y2="-14" stroke="#7a9ab5" stroke-width="2.5"/>
    <circle r="4" fill="#a0c0d8"/>
  </g>
  <text x="700" y="260" text-anchor="middle" font-family="serif" font-size="22" fill="#5a7a95" opacity="0.8">冬</text>
  <!-- 标题 -->
  <text x="400" y="340" text-anchor="middle" font-family="serif" font-size="28" fill="#6a4a3a" letter-spacing="12" opacity="0.6">四 季 之 思</text>
</svg>
