name: Build

on:
  push:
    branches: [master]
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # 1. 前端构建 → dist/（会先清空 dist）
      - run: npx vite build
      # 2. 内容构建 → dist/api/（只写 api 目录，不清空 dist）
      - run: node scripts/build.js
      - name: Commit dist/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "auto: update dist/ [skip ci]"
          git push
