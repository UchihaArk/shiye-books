<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="smg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6a"/>
      <stop offset="40%" stop-color="#2a6aaa"/>
      <stop offset="100%" stop-color="#4aa8d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#smg)"/>
  <!-- 荷塘水面 -->
  <ellipse cx="400" cy="320" rx="420" ry="100" fill="#1a5a3a" opacity="0.4"/>
  <!-- 荷叶 -->
  <ellipse cx="180" cy="290" rx="70" ry="35" fill="#2a7a3a" opacity="0.8"/>
  <line x1="180" y1="255" x2="180" y2="290" stroke="#1a5a2a" stroke-width="1"/>
  <ellipse cx="600" cy="300" rx="65" ry="30" fill="#3a8a4a" opacity="0.7"/>
  <line x1="600" y1="270" x2="600" y2="300" stroke="#2a6a3a" stroke-width="1"/>
  <ellipse cx="400" cy="330" rx="55" ry="25" fill="#2a7a3a" opacity="0.6"/>
  <!-- 荷花 -->
  <g transform="translate(300,250)">
    <ellipse rx="12" ry="25" fill="#f0a0b0" transform="rotate(-30)"/>
    <ellipse rx="12" ry="25" fill="#f4b0c0" transform="rotate(0)"/>
    <ellipse rx="12" ry="25" fill="#f0a0b0" transform="rotate(30)"/>
    <ellipse rx="10" ry="20" fill="#f8c8d4" transform="rotate(-15)"/>
    <ellipse rx="10" ry="20" fill="#f8c8d4" transform="rotate(15)"/>
    <circle r="6" fill="#f0d060"/>
  </g>
  <g transform="translate(500,260)" opacity="0.85">
    <ellipse rx="10" ry="22" fill="#f8c0d0" transform="rotate(-25)"/>
    <ellipse rx="10" ry="22" fill="#fad0dd" transform="rotate(5)"/>
    <ellipse rx="10" ry="22" fill="#f8c0d0" transform="rotate(35)"/>
    <circle r="5" fill="#f0d060"/>
  </g>
  <!-- 蜻蜓 -->
  <g transform="translate(450,180)" opacity="0.7">
    <ellipse rx="3" ry="12" fill="#d04060"/>
    <ellipse cx="-12" cy="-2" rx="14" ry="4" fill="#a0d0f0" opacity="0.5"/>
    <ellipse cx="12" cy="-2" rx="14" ry="4" fill="#a0d0f0" opacity="0.5"/>
  </g>
  <!-- 星光 -->
  <circle cx="100" cy="50" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="250" cy="30" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="680" cy="60" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="550" cy="40" r="1" fill="#fff" opacity="0.3"/>
  <!-- 萤火虫 -->
  <circle cx="150" cy="200" r="3" fill="#f0e860" opacity="0.7"/>
  <circle cx="650" cy="180" r="2.5" fill="#f0e860" opacity="0.5"/>
  <circle cx="350" cy="150" r="2" fill="#f0e860" opacity="0.4"/>
</svg>
