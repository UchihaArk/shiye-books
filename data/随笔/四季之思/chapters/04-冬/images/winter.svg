<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d8e8"/>
      <stop offset="60%" stop-color="#e0e8f0"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#wg)"/>
  <!-- 远山 -->
  <path d="M0,250 Q150,160 300,220 Q450,150 550,200 Q700,140 800,190 L800,400 L0,400Z" fill="#d0dae4" opacity="0.5"/>
  <!-- 雪地 -->
  <ellipse cx="400" cy="370" rx="500" ry="60" fill="#f0f4f8"/>
  <!-- 树 - 光秃枝干 -->
  <g stroke="#5a6a7a" fill="none" stroke-linecap="round">
    <line x1="250" y1="360" x2="250" y2="160" stroke-width="8"/>
    <line x1="250" y1="200" x2="200" y2="140" stroke-width="4"/>
    <line x1="200" y1="140" x2="180" y2="110" stroke-width="2.5"/>
    <line x1="200" y1="140" x2="215" y2="115" stroke-width="2"/>
    <line x1="250" y1="180" x2="300" y2="130" stroke-width="4"/>
    <line x1="300" y1="130" x2="320" y2="100" stroke-width="2.5"/>
    <line x1="300" y1="130" x2="280" y2="105" stroke-width="2"/>
    <line x1="250" y1="230" x2="190" y2="180" stroke-width="3.5"/>
    <line x1="190" y1="180" x2="170" y2="160" stroke-width="2"/>
    <line x1="250" y1="220" x2="310" y2="180" stroke-width="3"/>
    <line x1="310" y1="180" x2="330" y2="165" stroke-width="2"/>
  </g>
  <!-- 树枝上的雪 -->
  <ellipse cx="200" cy="137" rx="18" ry="5" fill="#fff" opacity="0.8"/>
  <ellipse cx="300" cy="127" rx="16" ry="5" fill="#fff" opacity="0.8"/>
  <ellipse cx="190" cy="177" rx="14" ry="4" fill="#fff" opacity="0.7"/>
  <!-- 第二棵小树 -->
  <g stroke="#6a7a8a" fill="none" stroke-linecap="round">
    <line x1="580" y1="355" x2="580" y2="200" stroke-width="6"/>
    <line x1="580" y1="240" x2="550" y2="200" stroke-width="3"/>
    <line x1="550" y1="200" x2="540" y2="180" stroke-width="2"/>
    <line x1="580" y1="220" x2="620" y2="185" stroke-width="3"/>
    <line x1="620" y1="185" x2="635" y2="170" stroke-width="2"/>
    <line x1="580" y1="270" x2="545" y2="240" stroke-width="2.5"/>
  </g>
  <ellipse cx="552" cy="197" rx="12" ry="4" fill="#fff" opacity="0.75"/>
  <ellipse cx="620" cy="182" rx="12" ry="4" fill="#fff" opacity="0.75"/>
  <!-- 雪花 -->
  <g fill="#8aa0b8" opacity="0.5">
    <circle cx="120" cy="80" r="3"/><circle cx="400" cy="50" r="2.5"/>
    <circle cx="680" cy="70" r="2"/><circle cx="500" cy="120" r="3"/>
    <circle cx="80" cy="200" r="2.5"/><circle cx="720" cy="180" r="2"/>
    <circle cx="350" cy="150" r="2"/><circle cx="450" cy="90" r="2.5"/>
  </g>
  <!-- 大雪花装饰 -->
  <g transform="translate(680,280)" stroke="#8aa0b8" stroke-width="1.5" opacity="0.35">
    <line x1="0" y1="-15" x2="0" y2="15"/>
    <line x1="-13" y1="-7.5" x2="13" y2="7.5"/>
    <line x1="-13" y1="7.5" x2="13" y2="-7.5"/>
    <line x1="-4" y1="-14" x2="4" y2="-14" stroke-width="1"/>
    <line x1="-4" y1="14" x2="4" y2="14" stroke-width="1"/>
  </g>
  <!-- 小屋 -->
  <rect x="80" y="280" width="60" height="45" fill="#a08060" rx="2"/>
  <polygon points="70,280 110,250 150,280" fill="#7a5040"/>
  <rect x="100" y="300" width="14" height="25" fill="#5a3a20"/>
  <rect x="87" y="290" width="10" height="10" fill="#d0a040" opacity="0.7"/>
  <!-- 屋顶雪 -->
  <path d="M65,280 L110,248 L155,280" stroke="#fff" stroke-width="6" fill="none" opacity="0.8"/>
  <!-- 烟 -->
  <path d="M115,250 Q120,230 110,215 Q115,200 108,185" stroke="#b0b8c0" stroke-width="2" fill="none" opacity="0.4"/>
</svg>
