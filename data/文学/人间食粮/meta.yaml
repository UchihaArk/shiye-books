title: 人间食粮
date: 2026-06-19
author: 安德烈·纪德（法）
translator: 陈阳
tags: [文学, 法国文学, 纪德, 诺贝尔文学奖, 哲学散文, 生命礼赞]
time: 约 50 分钟
summary: 诺贝尔文学奖得主纪德的青春宣言。以梅纳克之名向弟子纳桑奈尔倾诉：抛弃一切偶像与教条，投身大地万物，用肉体感受饥饿、干渴、炎热与欲望。这是一部燃烧着野兽派色彩的生命颂歌——"扔下这本书，离开你的城市、你的家庭、你的卧室和你的思绪，出发吧！"
