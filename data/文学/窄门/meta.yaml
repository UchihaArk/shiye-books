title: 窄门
date: 2026-06-19
author: 安德烈·纪德（法）
tags: [外国文学, 法国文学, 纪德, 诺贝尔文学奖, 爱情, 信仰]
time: 约 60 分钟
summary: 诺贝尔文学奖得主纪德的代表作。杰罗姆与表姐阿莉莎自幼相爱，却因对"窄门"信仰的追求，阿莉莎主动选择了苦修般的自我牺牲，将世俗幸福视作灵魂救赎的阻碍，最终在孤独中枯萎。一部关于爱、信仰与永恒的悲剧。
