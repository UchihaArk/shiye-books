summary: >-
  从母乳喂养、日常护理、睡眠管理到异常情况处理，一份覆盖新生儿照护方方面面的实战手册。侧重实操步骤与图解，
  包含正确衔乳姿势、拍嗝手法、安全睡眠、脐带护理、黄疸监测、洗澡步骤、换尿布流程，以及明确的红线禁止事项与必做清单。
