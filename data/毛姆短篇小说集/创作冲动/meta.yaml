summary: "阿尔伯特·福里斯特夫人是怎么写出《喀琉斯雕像》的，我猜没有几个人知道。 既然它被誉为是当下最伟大的小说之一，想必所有认真研习文学的人都会对它的诞生历程感兴趣。诚如评论家们所言，如果这是一部传世之作，那么以下叙述就不只是供读者消遣，"
