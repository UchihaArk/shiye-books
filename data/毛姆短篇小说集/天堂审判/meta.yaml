summary: "审判的时间还没到，他们就这样耐心地等待着。事实上，等待对于他们来说已经司空见惯。在逝去的三十年里他们三人一直都在坚定地等待着，生活的煎熬只为这一刻。现在，他们也许没有自信，可是无论怎样都怀揣希望，鼓足了勇气，"
