summary: "在那面的码头上烈日炎炎，酷暑难当。摩托车、卡车、公共汽车、私家小轿车，各种车辆川流不息，雇工们也不停地穿梭在其中。人流，车流，时快时慢，争先恐后地行驶在拥堵不堪的大街上，每个司机都在不耐烦地按着喇叭；黄包车敏捷地穿行在人头攒动的夹缝里，"
