summary: "有一次走进一座偌大的城市就能目睹一些奇闻轶事，少之又少。然而，塞雷就遇到过，亲眼看到了一件奇怪的事。他第一次开车去那不勒斯时，偶遇这么一件事：一位年轻人从路边的店铺里跑出来，一个男人手里拿着刀紧随其后，追上后，一刀刺进年轻人的颈部，"
