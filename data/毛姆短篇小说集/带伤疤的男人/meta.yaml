title: 带伤疤的男人
date: 2026-06-07
cover: images/cover.jpg
images: [images/01.jpg, images/02.jpg, images/03.jpg, images/04.jpg]
author: （英）毛姆
tags: [短篇小说, 毛姆, 带伤疤的男人]
time: 约 6 分钟
summary: "因为那条伤疤，我才第一次注意到他。那伤疤从太阳穴延伸到下巴，又宽又红，呈新月状。当时的伤口一定很吓人，我不知道是军刀还是弹壳碎片留下的。在这张又圆又胖、和和气气的脸上，这伤疤感觉有些突兀。他长得小鼻子小眼、其貌不扬的，但一看就心性单纯，"
