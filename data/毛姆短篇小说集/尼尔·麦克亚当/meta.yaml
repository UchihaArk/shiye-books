summary: "里登船长为人随和温厚。当吉隆坡索洛尔博物馆馆长安格斯·门罗告诉他说，他已经嘱咐过尼尔·麦克亚当，就是他那个新来的助理，他只要一抵达新加坡，就安排他住进范·戴克大酒店，并拜托他留意一下，在他必须在此地度过的这几天里，"
