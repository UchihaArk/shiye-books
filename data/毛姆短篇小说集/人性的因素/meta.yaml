title: 人性的因素
date: 2026-06-07
cover: images/cover.jpg
author: （英）毛姆
tags: [短篇小说, 毛姆, 丛林里的脚印]
time: 约 63 分钟
summary: "我似乎每次都是在游人稀少的淡季来到罗马的。八月或九月里，在前往另外某个地方的途中，有时会经过罗马，顺便在这里消磨两三天，凭着昔日的老交情去寻访故地，或者再去看一眼所喜爱的那些画作。这个时节的天气非常炎热，"
