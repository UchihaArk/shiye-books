title: 乞丐
date: 2026-06-07
cover: images/cover.jpg
author: （英）毛姆
tags: [短篇小说, 毛姆, 带伤疤的男人]
time: 约 9 分钟
summary: "上帝知道，我一直怨叹，即使时间翻倍，也没法做完手头一半的活儿。我已记不得次什么时候偷得半日清闲。我常幻想可以整整一周悠闲自在。我们大多数人若不是忙着工作就是在忙着玩乐：骑马、网球、高尔夫、游泳、赌博；而我却幻想自己什么都不干。"
illustrations:
  - image: images/plaza_vultures.jpg
    desc: "维拉克鲁斯广场上兀鹰盘旋，烈日炙烤"
  - image: images/beggar_cathedral_steps.jpg
    desc: "教堂台阶上的落魄红发乞丐"
  - image: images/rome_memory.jpg
    desc: "罗马餐厅里的青涩岁月——骄傲与野心"
