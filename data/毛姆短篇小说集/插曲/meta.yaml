summary: "因为女主人喜欢大众话题，所以聚会的规模一般不大，一起吃饭的最多八人，一般只有六位。饭后到客厅时，座次安排得也相当用心，任何两个人都别想躲到某个角落说悄悄话让大家扫兴。一进屋我就高兴地发现，在座的宾客我全认识。除了女主人，"
