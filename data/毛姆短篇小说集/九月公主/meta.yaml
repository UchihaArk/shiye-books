summary: "高兴得直拍手，于是，小鸟便跳上了她的床头，用婉转的歌喉唱来，直到把她哄睡着了。 第二天，她一觉醒来时，小鸟依然守候在她的床前，她刚睁开眼睛，小鸟就朝她道了声“早晨好”。侍女们把她的早饭端进屋来，小鸟吃了她托在手掌上的米饭，"
