summary: "一八九七年八月，因为工作原因，我不得不从纽约去了彼得格勒，为了安全起见，我奉命取道海参崴。我早上下了飞机，在那里度过了尽量悠闲的天。我记得，在横贯西伯利亚的火车将要出发之前，大约晚上九点，我个人在车站的餐厅用餐。餐厅里很拥挤，"
