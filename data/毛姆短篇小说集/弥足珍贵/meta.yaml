summary: "查德·哈伦杰是个幸福的人。从《传道书》开始，不管悲观主义者们怎么说，其实在这个不尽如人意的世界里，幸福的人不在少数。但查德·哈伦杰能感觉到自己是幸福的，这就稀奇了。古人推崇的中庸之道已经过时，很多人不再认为自我约束是一种美德，"
