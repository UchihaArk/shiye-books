summary: "他们搞到了一个没有人的头等间。运气着实不错，因为们随身带了很多行李，除了阿尔班的手提箱和旅行袋，还有安妮的梳妆箱和帽盒。行李车厢里另有两只大旅行箱，里面装的是随时会用到的东西，阿尔班把剩下的行李寄存在一家代理那里，运抵伦敦后，由代理保管，"
