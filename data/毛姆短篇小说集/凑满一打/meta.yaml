summary: "我喜欢埃尔索姆。那是坐落在英格兰南部的一个海滨度假胜地，离布莱顿不算太远，那个宜人的小镇颇有点儿乔治国王时代晚期的魅力。不过，这个地方既不喧闹，也不俗艳。十年前，经常动不动就去那儿，你依然时不时就会看到一幢古老的房屋，很坚固，而且虚于其表，"
