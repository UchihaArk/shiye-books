summary: "·哈代明白要想办法把噩耗告诉她，要尽可能婉转地、慢慢地和她讲，但是不管怎样总是要说出发生的不幸。一开始，她好像根本不知道哈代说的是什么意思。 “死了？”她喊道，“死了，我的罗伯特死了？” 此时，瑞德·哈代，一个浪荡的懒汉，"
